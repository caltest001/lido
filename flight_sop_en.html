<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Flight Plan – Operating Procedures</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{padding:18px 16px;max-width:680px;margin:0 auto;background:#f7f4f0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.root-card{background:#8a9fa8;border-radius:16px;padding:18px 24px;margin-bottom:16px;text-align:center}
.root-title{font-size:22px;font-weight:700;color:#fff}
.root-sub{font-size:14px;color:rgba(255,255,255,0.8);margin-top:4px}
.top-bar{display:flex;justify-content:flex-end;margin-bottom:12px}
.all-btn{font-size:15px;color:#6a8088;background:#fff;border:1px solid #c8d4d8;border-radius:8px;padding:7px 18px;cursor:pointer}
.phase-wrap{margin-bottom:12px}
.phase-btn{width:100%;display:flex;align-items:center;gap:14px;border:none;border-radius:14px;padding:16px 18px;cursor:pointer;text-align:left}
.phase-label{font-size:18px;font-weight:700;color:#fff}
.phase-sub{font-size:14px;color:rgba(255,255,255,0.78);margin-top:3px}
.tog{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.28);border:1.5px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;line-height:1}
.phase-children{padding-left:16px;padding-top:10px;display:flex;flex-direction:column;gap:8px}
.sg-wrap{margin-bottom:6px}
.sg-btn{width:100%;display:flex;align-items:center;gap:12px;border-radius:10px;padding:12px 16px;cursor:pointer;text-align:left;border:none}
.sg-label{font-size:16px;font-weight:600}
.sg-badge{font-size:12px;padding:3px 9px;border-radius:6px;margin-left:10px;font-weight:600;vertical-align:middle}
.sg-tog{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;line-height:1}
.sg-children{padding-left:18px;padding-top:8px;display:flex;flex-direction:column;gap:7px}
.leaf{display:flex;align-items:flex-start;gap:10px}
.leaf-line{width:16px;height:2px;flex-shrink:0;margin-top:16px}
.leaf-card{flex:1;border-radius:10px;padding:12px 16px}
.leaf-title{font-size:15px;font-weight:600;line-height:1.4}
.leaf-body{font-size:14px;margin-top:6px;line-height:1.7}
.leaf-sub-item{display:flex;gap:8px;margin-top:4px}
.leaf-dot{flex-shrink:0;font-size:13px;margin-top:2px}
.warn{font-size:13px;margin-top:8px;padding:6px 10px;border-radius:6px;font-weight:500}
.image-btn{padding:4px 8px;font-size:11px;margin-left:5px;cursor:pointer;border:1px solid #a8c4d4;border-radius:4px;background:#eef4f8;color:#1e3848}
#imageModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:999;justify-content:center;align-items:center}
#imageModal.open{display:flex}
#modalImage{max-width:90%;max-height:88vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
#modalClose{position:fixed;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;line-height:1;background:none;border:none}
</style>
</head>
<body>

<div id="imageModal">
  <button id="modalClose" onclick="closeImageModal()">✕</button>
  <img id="modalImage" src="" alt="">
</div>

<div id="app">
  <div class="root-card">
    <div class="root-title">Electronic Flight Plan – Operating Procedures</div>
    <div class="root-sub">Tap any section header to expand / collapse</div>
  </div>
  <div class="top-bar">
    <button class="all-btn" id="allBtn">Collapse All</button>
  </div>
  <div id="phases"></div>
</div>

<script>
const P={
  blue:{
    pBg:'#8aa8b8',
    sgBg:'#dce8f0',sgBorder:'#a8c4d4',sgText:'#1e3848',sgTog:'#5a8aa0',sgTogBg:'#c0d8e8',
    leafBg:'#eef4f8',leafBorder:'#b8d0de',leafText:'#1e3848',
    badgeBg:'#a8c4d4',badgeText:'#1e3848',
    warnBg:'#fff3e0',warnText:'#7a4a10'
  },
  teal:{
    pBg:'#8ab0a8',
    leafBg:'#e8f4f0',leafBorder:'#a8ccc4',leafText:'#1a3830',
    warnBg:'#fff3e0',warnText:'#7a4a10'
  },
  green:{
    pBg:'#98b080',
    leafBg:'#eef4e4',leafBorder:'#b8cc98',leafText:'#1e3010',
    warnBg:'#fff3e0',warnText:'#7a4a10'
  }
};

function openImageModal(imageName){
  const modal=document.getElementById('imageModal');
  const modalImg=document.getElementById('modalImage');
  modalImg.src=imageName;
  modalImg.alt='Reference image: '+imageName;
  modal.classList.add('open');
  modal.onclick=function(e){if(e.target===modal)closeImageModal();};
}
function closeImageModal(){
  document.getElementById('imageModal').classList.remove('open');
}

const PHASES=[
  {id:'pre',label:'Phase 1 – Pre-Pushback',sub:'7 Sub-sections',pal:P.blue,isGroup:true,
    children:[
      {id:'g1',label:'Sign-in & Login',badge:'ETD − 90 min',
        children:[
          {title:'Log In to APP',body:'All flight crew members must log in to the mobile application (APP) using their personal credentials approximately 90 minutes before the Estimated Time of Departure (ETD).'},
        ]},
      {id:'g2',label:'Flight Selection',badge:'',
        children:[
          {title:'Standard Procedure',body:'Based on the General Dispatcher (GD) assignment, the assigned flight will appear automatically on the Dashboard.'},
          {title:'Special Cases',body:'Use the "Add Flight" function to manually search for the assigned flight if it does not appear automatically.'},
        ]},
      {id:'g3',label:'Data Download & Review',badge:'',
        children:[
          {title:'Confirm & Download',body:'Verify aircraft information and download the current flight plan.'},
          {title:'Review All Content',body:'All crew members must thoroughly review the Dashboard, Briefing, and Map sections.'},
        ]},
      {id:'g4',label:'Fuel Operations',badge:'ETD − 50 min',
        children:[
          {title:'Request Fuel',body:`Execute AA Request Fuel as required. Dispatch will then prepare and upload a revised flight plan.<br>Crew may also contact Dispatch to request that the revised or original plan be placed in the Dispatch Info folder, as shown: <button class="image-btn" onclick="openImageModal('addio.png')">View Image</button>`},
          {title:'Confirm Fuel',body:'In the Briefing section, navigate to the Fuel tab, confirm the fuel quantity, and select "Order" (this action confirms fuel quantity only; it does not constitute a fuel order).'},
          {title:'Fuel Sheet Upload',body:'If using a paper fuel sheet, photograph and upload it via the Add Attachment function.'},
        ]},
      {id:'g5',label:'Plan Acceptance & Crew Assignment',badge:'ETD − 30 min',
        children:[
          {title:'Accept Flight',body:'At ETD − 30 minutes, select "Accept Flight" within Lido mBriefing (this action confirms execution of the electronic flight plan only).'},
          {title:'Master Designation',body:'The PIC shall designate one crew member as Master.\nThe designated crew member must enter "M + last four digits of the Captain\'s license number" in the Notes field.'},
          {title:'ACARS OFP ACPT',body:'At ETD − 30 minutes, <span style="color:red; font-weight:bold;">execute ACARS OFP ACPT. (Mandatory regulatory procedure)</span>'},
        ]},
      {id:'g6',label:'Load & Performance',badge:'ETD − 15 min',
        children:[
          {title:'ACARS LS ACPT',body:'At ETD − 15 minutes, execute ACARS LS ACPT.'},
          {title:'Enter Actual Weights',body:'Input actual weight-related data in the General Part section.'},
          {title:'Performance Upload',body:'Once performance calculations are complete, photograph and upload via the Add Attachment function.'},
        ]},
      {id:'g7',label:'Remaining Pre-Departure Tasks',badge:'',
        children:[
          {title:'Record Flight Information',body:'Use the Notes or Classic OFP function to record all relevant flight information.'},
          {title:'NOTOC – Dangerous Goods Notification',body:'Complete paper signature as required.\nAfter landing, return documents via the original black bag collection procedure.'},
          {title:'System Synchronisation',body:'Before pushback, perform a system Sync.',warn:'⚠ If Sync fails, use the Share function instead.'},
          {title:'Pushback',body:'After completing all of the above procedures, proceed with pushback.'},
        ]},
    ]},
  {id:'cruise',label:'Phase 2 – Cruise',sub:'3 Key Items',pal:P.teal,isGroup:false,
    children:[
      {title:'Navlog Recording',body:'Use Notes to record: Navlog fuel figures, time, altitude entries, and Wind/Temperature data.'},
      {title:'Upper Wind Information',body:'Refer to the Classic OFP section for upper wind data.'},
      {title:'En-Route Information Logging',body:'Use the Notes or Classic OFP function to record all relevant en-route flight information.'},
    ]},
  {id:'land',label:'Phase 3 – Post-Landing',sub:'5 Steps',pal:P.green,isGroup:false,
    children:[
      {title:'Operation Log',body:'Complete the Operation Log and upload a photograph via the Add Attachment function.'},
      {title:'Journey Log',body:'Accurately enter all Flight Times and Fuel data in the Journey Log.'},
      {title:'Submit – All Crew Members',body:'Every crew member must individually execute Submit.'},
      {title:'Master – Final Review',body:'The designated Master crew member performs a final check:\n① Verify Flight Checklist is complete and correct\n② Execute Submit (the system will use the data submitted by this crew member as the official record).'},
      {title:'Departure from Aircraft',body:'All crew members may depart the aircraft only after confirming that all procedures have been completed.'},
    ]},
];

const phaseOpen={},sgOpen={};
PHASES.forEach(p=>{
  phaseOpen[p.id]=true;
  if(p.isGroup) p.children.forEach(g=>sgOpen[g.id]=true);
});

function leaf(ch,pal){
  const lines=ch.body?ch.body.split('\n').map(l=>`<div class="leaf-sub-item"><span class="leaf-dot">·</span><span>${l}</span></div>`).join(''):'';
  const warn=ch.warn?`<div class="warn" style="background:${pal.warnBg};color:${pal.warnText}">${ch.warn}</div>`:'';
  return `<div class="leaf">
    <div class="leaf-line" style="background:${pal.leafBorder}"></div>
    <div class="leaf-card" style="background:${pal.leafBg};border:1px solid ${pal.leafBorder}">
      <div class="leaf-title" style="color:${pal.leafText}">${ch.title}</div>
      ${ch.body?`<div class="leaf-body" style="color:${pal.leafText}">${lines}</div>`:''}
      ${warn}
    </div>
  </div>`;
}

function subgroup(g,pal){
  const open=sgOpen[g.id];
  const badge=g.badge?`<span class="sg-badge" style="background:${pal.badgeBg};color:${pal.badgeText}">${g.badge}</span>`:'';
  return `<div class="sg-wrap">
    <button class="sg-btn" style="background:${pal.sgBg};border:1px solid ${pal.sgBorder}" onclick="toggleSg('${g.id}')">
      <div style="flex:1"><span class="sg-label" style="color:${pal.sgText}">${g.label}</span>${badge}</div>
      <div class="sg-tog" style="background:${pal.sgTogBg};color:${pal.sgTog};border:1px solid ${pal.sgBorder}">${open?'−':'+'}</div>
    </button>
    ${open?`<div class="sg-children">${g.children.map(ch=>leaf(ch,pal)).join('')}</div>`:''}
  </div>`;
}

function phase(p){
  const open=phaseOpen[p.id];
  const inner=open?(p.isGroup?p.children.map(g=>subgroup(g,p.pal)).join(''):p.children.map(ch=>leaf(ch,p.pal)).join('')):'';
  return `<div class="phase-wrap">
    <button class="phase-btn" style="background:${p.pal.pBg}" onclick="togglePhase('${p.id}')">
      <div style="flex:1">
        <div class="phase-label">${p.label}</div>
        <div class="phase-sub">${p.sub}</div>
      </div>
      <div class="tog">${open?'−':'+'}</div>
    </button>
    ${open?`<div class="phase-children">${inner}</div>`:''}
  </div>`;
}

function render(){
  document.getElementById('phases').innerHTML=PHASES.map(p=>phase(p)).join('');
  document.getElementById('allBtn').textContent=Object.values(phaseOpen).some(v=>v)?'Collapse All':'Expand All';
}
window.togglePhase=id=>{phaseOpen[id]=!phaseOpen[id];render();}
window.toggleSg=id=>{sgOpen[id]=!sgOpen[id];render();}
document.getElementById('allBtn').addEventListener('click',()=>{
  const any=Object.values(phaseOpen).some(v=>v);
  PHASES.forEach(p=>{
    phaseOpen[p.id]=!any;
    if(p.isGroup) p.children.forEach(g=>sgOpen[g.id]=!any);
  });
  render();
});
render();
</script>

</body>
</html>
